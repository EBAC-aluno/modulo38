<!DOCTYPE html>
<html xmlns="http://www.w3c.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui">
<h:head>
  <h:outputStylesheet library="myStyle" name="style.css" />
</h:head>
<h:body>
  <h1>List</h1> 
  <h:form>
    <h:dataTable value="#{newBean.list}" var="p">  
      <h:column>  
        <f:facet name="header">ID</f:facet>  
        <h:outputText value="#{p.name}"/>  
      </h:column>  
      <h:column>  
        <f:facet name="header">Name</f:facet>  
        <h:outputText value="#{p.telephoneNumber}"/>  
      </h:column>  
      <h:column>  
        <f:facet name="header">Price</f:facet>  
        <h:outputText value="#{p.telephoneType.description}" />  
      </h:column>  
    </h:dataTable>  
  </h:form>
  <button style="margin-top: 30px;" onclick="location.href='/TodoApplication/index.xhtml'" type="button">add telephone</button>
 
</h:body>

</html>
