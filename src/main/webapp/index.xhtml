<!DOCTYPE html>
<html xmlns="http://www.w3c.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:p="http://primefaces.org/ui">
<h:head>
  <h:outputStylesheet library="myStyle" name="style.css" />
</h:head>
<h:body>
  <h1>Forms</h1> 
  <h:form>
    <h:panelGrid columns="2">

      <h:outputText value="Name: " for="nameField" />
      <h:inputText id="nameField" value="#{bean.item.name}" />

      <h:outputText value="Telephone: " for="telephone" />
      <h:inputText id="telephoneField" value="#{bean.item.telephone}"/>

      <h:outputLabel value="telephone type: " for="type" />
      <h:selectOneMenu id="type" value="#{bean.item.telephoneType}">
        <f:selectItems value="#{bean.telephoneType}" var="telephoneType" itemLabel="#{telephoneType.description}" itemValue="#{telephoneType}"/>
      </h:selectOneMenu>
      
      <h:outputLabel />
      <div class="right">
        <h:commandButton value="Submit" actionListener="#{bean.submit}" />
      </div>

    </h:panelGrid>
  </h:form>
</h:body>

</html>
